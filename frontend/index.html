<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend</title>
</head>
<body>
    <div id="app"></div>
    <script>
      window.addEventListener('TrunkApplicationStarted', () => {
        if (typeof window.wasmBindings?.run === 'function') {
          window.wasmBindings.run();
        }
      });
    </script>
</body>
</html>
